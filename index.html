<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Вера Николаевна — Школьный кликер</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #2b2118; /* цвет старой доски */
      height: 100vh;
      overflow: hidden;
      touch-action: manipulation;
    }

    #root {
      height: 100%;
      display: flex;
      flex-direction: column;
      background: radial-gradient(circle at 20% 30%, #3e2e1f, #1f1812);
      box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
      position: relative;
    }

    /* Школьная тема: текстура мела, доска, лента */
    .chalkboard-header {
      background: #0c3b2e; /* зелёный доски */
      padding: 20px 16px 12px;
      border-bottom: 4px solid #a57c4b;
      box-shadow: 0 4px 0 #5e3a1c;
      position: relative;
      font-family: 'Courier New', monospace;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .chalkboard-header::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: repeating-linear-gradient(45deg, rgba(255,255,240,0.05) 0px, rgba(255,255,240,0.05) 4px, transparent 4px, transparent 8px);
      pointer-events: none;
    }

    .teacher-name {
      font-size: 1rem;
      color: #f9e0a0;
      text-shadow: 2px 2px 0 #422b1b;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .teacher-name span {
      background: #9e6d3b;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.8rem;
      color: #fef7d6;
      border: 1px solid #eec27e;
    }

    .score-board {
      background: #1e4d3b;
      border: 4px solid #ba9f6c;
      border-radius: 30px;
      padding: 12px 24px;
      margin: 12px 0 8px;
      display: inline-block;
      box-shadow: inset 0 -3px 0 #3c2b14, 0 6px 0 #2f4d3a;
    }

    .score-number {
      font-size: 3.2rem;
      font-weight: 900;
      color: #fefae0;
      text-shadow: 3px 3px 0 #5a3e1f, 5px 5px 0 #2b4b2b;
      line-height: 1;
      font-family: 'Courier New', monospace;
    }

    .energy-block {
      padding: 0 20px 10px;
    }

    .energy-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      color: #edd5a8;
      text-shadow: 1px 1px 0 #352a1c;
      margin-bottom: 4px;
    }

    .energy-track {
      height: 20px;
      background: #3a281c;
      border-radius: 30px;
      border: 2px solid #785f34;
      overflow: hidden;
      box-shadow: inset 0 2px 5px #0f0904;
    }

    .energy-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #f6b83d, #ffdd87);
      border-radius: 30px;
      box-shadow: 0 0 15px #ffb347;
      transition: width 0.3s ease;
    }

    /* Учительница — центр */
    .teacher-click-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
    }

    .teacher-emoji {
      font-size: 240px;
      line-height: 1;
      filter: drop-shadow(0 20px 15px #00000070);
      transform: scale(1);
      transition: transform 0.1s cubic-bezier(0.2, 1.6, 0.5, 1);
      text-shadow: 0 0 0 transparent;
    }

    .teacher-emoji:active {
      transform: scale(0.85);
    }

    .chalk-particle {
      position: absolute;
      font-size: 32px;
      font-weight: bold;
      color: #f9eeb2;
      text-shadow: 0 0 10px #ffd966, 1px 1px 0 #7a4d1a;
      pointer-events: none;
      z-index: 100;
      animation: chalkFloat 1.2s forwards;
    }

    @keyframes chalkFloat {
      0% { opacity: 1; transform: translateY(0) rotate(0deg); }
      100% { opacity: 0; transform: translateY(-150px) rotate(20deg); }
    }

    .bottom-stats {
      background: #a28357;
      border-top: 4px solid #eccc8b;
      padding: 12px 20px 18px;
      display: flex;
      justify-content: space-around;
      box-shadow: 0 -6px 0 #594d32;
      color: #2b1f0f;
      font-weight: bold;
      font-size: 1rem;
      text-transform: uppercase;
    }

    .stat-item {
      text-align: center;
      background: #fcf0cf;
      padding: 8px 16px;
      border-radius: 40px;
      border: 2px solid #c9a454;
      min-width: 100px;
      box-shadow: inset 0 -3px 0 #b3904b, 0 4px 0 #5b451f;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 900;
      color: #3b5211;
      line-height: 1;
      text-shadow: 1px 1px 0 #fef1b9;
    }

    .stat-label {
      font-size: 0.7rem;
      color: #5e3d17;
    }

    /* Школьные эмодзи вместо картинок */
    .decor {
      position: absolute;
      font-size: 40px;
      opacity: 0.3;
      pointer-events: none;
    }

    .decor-1 { top: 10px; left: 10px; }
    .decor-2 { bottom: 60px; right: 10px; transform: rotate(10deg); }
    .decor-3 { top: 40%; left: 5px; }
  </style>
</head>
<body>
<div id="root">
  <!-- Школьные декорации эмодзи (имитация фоток) -->
  <div class="decor decor-1">📚</div>
  <div class="decor decor-2">✏️</div>
  <div class="decor decor-3">🧪</div>

  <div class="chalkboard-header">
    <div class="teacher-name">
      👩‍🏫 Вера Николаевна <span>Класс 7 «Б»</span>
    </div>
    <div class="score-board">
      <span class="score-number" id="coins">0</span>
    </div>
  </div>

  <div class="energy-block">
    <div class="energy-label">
      <span>🔋 Энергия учителя</span>
      <span id="energyText">1000/1000</span>
    </div>
    <div class="energy-track">
      <div class="energy-fill" id="energyFill" style="width:100%"></div>
    </div>
  </div>

  <div class="teacher-click-area" id="clickArea">
    <div class="teacher-emoji" id="vera">👩‍🏫</div>
  </div>

  <div class="bottom-stats">
    <div class="stat-item">
      <div class="stat-value" id="passive">0.0</div>
      <div class="stat-label">📈 в сек</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="taps">0</div>
      <div class="stat-label">👆 проверок</div>
    </div>
  </div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  // Состояние с исправленным восстановлением энергии (не мгновенно)
  let state = {
    coins: 0,
    level: 1,
    energy: 1000,
    maxEnergy: 1000,
    passivePerSec: 0.5,  // стартовый пассив
    tapsCount: 0,
    lastEnergyTime: Date.now(),
    tapValue: 1,
    energyPerTap: 2,      // тратим 2 энергии за тап
  };

  // Загрузка
  function loadState() {
    const saved = localStorage.getItem('vera_school_state');
    if (saved) {
      Object.assign(state, JSON.parse(saved));
    }
    render();
  }

  function saveState() {
    localStorage.setItem('vera_school_state', JSON.stringify(state));
    // Для Telegram WebApp можно отправить данные, но пока локально
  }

  function render() {
    document.getElementById('coins').innerText = Math.floor(state.coins).toLocaleString();
    document.getElementById('energyText').innerText = `${Math.floor(state.energy)}/${state.maxEnergy}`;
    const energyPercent = (state.energy / state.maxEnergy) * 100;
    document.getElementById('energyFill').style.width = energyPercent + '%';
    document.getElementById('passive').innerText = state.passivePerSec.toFixed(1);
    document.getElementById('taps').innerText = state.tapsCount.toLocaleString();
  }

  // Частицы мела
  function createChalkParticle(x, y) {
    const p = document.createElement('div');
    p.className = 'chalk-particle';
    p.textContent = '✧ +' + state.tapValue;
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1200);
  }

  // Обработка клика/тапа
  function handleTap(e) {
    e.preventDefault?.(); // для touch

    if (state.energy < state.energyPerTap) {
      // недостаточно энергии — мелодия? пока просто вибрация (если поддерживает)
      if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
      return;
    }

    state.energy -= state.energyPerTap;
    state.coins += state.tapValue;
    state.tapsCount++;

    // координаты для частиц
    let clientX, clientY;
    if (e.touches) {
      clientX = e.touches[0].clientX;
      clientY = e.touches[0].clientY;
    } else {
      clientX = e.clientX;
      clientY = e.clientY;
    }
    createChalkParticle(clientX, clientY);

    // легкая вибрация при удачном клике
    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');

    render();
    saveState();
  }

  // ГЕЙМЛУП — пассивный доход и ВОССТАНОВЛЕНИЕ ЭНЕРГИИ (исправлено: не мгновенно)
  function gameTick() {
    const now = Date.now();
    const deltaSec = (now - (state.lastEnergyTime || now)) / 1000;
    if (deltaSec > 0.1) { // не слишком частые обновления
      // Пассивный доход
      state.coins += state.passivePerSec * deltaSec;

      // Восстанавливаем энергию: 2% в секунду от максимума (но не больше максимума)
      const regenRate = 0.02; // 2% в секунду
      const energyRegen = state.maxEnergy * regenRate * deltaSec;
      state.energy = Math.min(state.maxEnergy, state.energy + energyRegen);

      state.lastEnergyTime = now;
      render();
      saveState();
    }
  }

  // Привязка событий
  const clickArea = document.getElementById('clickArea');
  clickArea.addEventListener('mousedown', handleTap);
  clickArea.addEventListener('touchstart', handleTap, { passive: false });
  // запрещаем контекстное меню
  clickArea.addEventListener('contextmenu', (e) => e.preventDefault());

  // Запуск
  loadState();
  setInterval(gameTick, 300); // чаще для плавности

  // Кнопка магазина
  tg.MainButton.setText('📚 Школьная лавка').show();
  tg.MainButton.onClick(() => {
    alert('🧑‍🏫 Вера Николаевна:\n\n«Скоро принесёт журнал и указку!»\n\n• Доска почёта: +1 за тап\n• Указка: +энергия\n• Стопка тетрадей: пассив');
  });
</script>
</body>
</html>
