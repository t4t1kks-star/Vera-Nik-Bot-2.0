<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Вера Николаевна — Школьный кликер</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:#1a2f1f; height:100vh; overflow:hidden; touch-action:manipulation; }
    #root { height:100%; display:flex; flex-direction:column; background:linear-gradient(145deg,#2a401f,#1d2e15); position:relative; }
    .header { background:#4a6b2f; padding:12px 16px 8px; border-bottom:4px solid #e6c87c; box-shadow:0 4px 0 #3d4f24; display:flex; align-items:center; gap:12px; }
    .tg-avatar { width:48px; height:48px; border-radius:50%; background:#7b5e3b; border:3px solid #f9e0a0; display:flex; align-items:center; justify-content:center; font-size:24px; color:white; overflow:hidden; flex-shrink:0; }
    .tg-avatar img { width:100%; height:100%; object-fit:cover; }
    .user-info { flex:1; }
    .user-name { color:#fef7d6; font-size:1.2rem; font-weight:bold; text-shadow:2px 2px 0 #3a5520; margin-bottom:2px; }
    .user-class { color:#ffd966; font-size:0.8rem; background:#2e4a1e; display:inline-block; padding:2px 12px; border-radius:20px; border:1px solid #c9a454; }
    .score-panel { background:#345e2e; margin:12px 16px; padding:12px; border-radius:30px; border:3px solid #ba9f6c; box-shadow:inset 0 -3px 0 #1e3a18, 0 6px 0 #264d1a; display:flex; justify-content:space-between; align-items:center; }
    .score-label { color:#f5e2b2; font-size:0.9rem; text-transform:uppercase; }
    .score-value { font-size:2.8rem; font-weight:900; color:#fefae0; text-shadow:3px 3px 0 #5a3e1f, 5px 5px 0 #2b4b2b; line-height:1; font-family:'Courier New',monospace; }
    .energy-container { padding:0 16px 10px; }
    .energy-header { display:flex; justify-content:space-between; color:#edd5a8; margin-bottom:4px; font-size:0.9rem; }
    .energy-bar-bg { height:20px; background:#3a281c; border-radius:30px; border:2px solid #785f34; overflow:hidden; }
    .energy-fill { height:100%; width:100%; background:linear-gradient(90deg,#f6b83d,#ffdd87); transition:width 0.3s ease; }
    .click-area { flex:1; display:flex; align-items:center; justify-content:center; position:relative; cursor:pointer; margin:8px 0; }
    .user-photo { width:220px; height:220px; border-radius:50%; border:6px solid #e6c87c; box-shadow:0 20px 25px -8px black, 0 0 0 4px #4a6b2f; object-fit:cover; transition:transform 0.1s ease; }
    .user-photo:active { transform:scale(0.92); }
    .particle { position:absolute; font-size:28px; font-weight:bold; color:#ffd966; text-shadow:2px 2px 0 #7a4d1a; pointer-events:none; z-index:100; animation:floatUp 1s forwards; }
    @keyframes floatUp { 0% { opacity:1; transform:translateY(0) rotate(0deg); } 100% { opacity:0; transform:translateY(-120px) rotate(15deg); } }
    .tabs { display:flex; background:#4f7535; border-top:3px solid #e6c87c; padding:8px 8px 0; gap:4px; }
    .tab { flex:1; text-align:center; padding:12px 0; background:#3e6329; color:#efdba8; border-radius:20px 20px 0 0; font-weight:bold; border:2px solid #a5874b; border-bottom:none; cursor:pointer; transition:0.2s; }
    .tab.active { background:#fcf0cf; color:#2b4a1a; transform:translateY(-4px); }
    .tab-content { background:#fcf0cf; flex:1; overflow-y:auto; padding:16px; border-top:4px solid #c9a454; box-shadow:inset 0 10px 15px -10px #7b5e3b; }
    .upgrade-item { background:#fff9e6; border:3px solid #b68f4c; border-radius:20px; padding:15px; margin-bottom:12px; display:flex; align-items:center; gap:15px; box-shadow:0 5px 0 #7b5e3b; }
    .upgrade-emoji { font-size:40px; background:#4a6b2f; width:70px; height:70px; border-radius:30px; display:flex; align-items:center; justify-content:center; border:3px solid #eec27e; }
    .upgrade-info { flex:1; }
    .upgrade-name { font-size:1.2rem; font-weight:bold; color:#2b4a1a; }
    .upgrade-desc { color:#765e31; font-size:0.8rem; }
    .upgrade-price { color:#b6562e; font-weight:bold; font-size:1.3rem; }
    .buy-btn { background:#4f8b3a; border:none; color:white; font-weight:bold; padding:10px 20px; border-radius:30px; border-bottom:4px solid #2a551a; font-size:1rem; cursor:pointer; }
    .buy-btn:active { transform:translateY(2px); border-bottom-width:2px; }
    .leaderboard-item { display:flex; align-items:center; background:#e9dbbd; margin-bottom:8px; padding:8px 15px; border-radius:40px; border:2px solid #b68f4c; gap:10px; }
    .rank { font-size:1.5rem; font-weight:900; width:40px; color:#9e6d3b; }
    .leader-avatar { width:40px; height:40px; border-radius:50%; background:#7b5e3b; border:2px solid #e6c87c; display:flex; align-items:center; justify-content:center; font-size:20px; color:white; }
    .leader-name { flex:1; font-weight:bold; color:#2d421b; }
    .leader-score { font-weight:900; color:#b6562e; }
    .hidden { display:none !important; }
    .income-badge { background:#4a6b2f; color:#fefae0; padding:4px 10px; border-radius:20px; font-size:0.8rem; display:inline-block; margin-top:4px; }
  </style>
</head>
<body>
<div id="root">
  <div class="header">
    <div class="tg-avatar" id="avatarContainer"><span id="avatarPlaceholder">👤</span></div>
    <div class="user-info">
      <div class="user-name" id="tgName">Загрузка...</div>
      <div class="user-class">7 «Б» класс</div>
    </div>
  </div>

  <div class="score-panel">
    <span class="score-label">📚 Проверено тетрадей</span>
    <span class="score-value" id="coins">0</span>
  </div>

  <div class="energy-container">
    <div class="energy-header">
      <span>🔋 Энергия Веры</span>
      <span id="energyText">500/500</span>
    </div>
    <div class="energy-bar-bg">
      <div class="energy-fill" id="energyFill" style="width:100%"></div>
    </div>
  </div>

  <div class="click-area" id="clickArea">
    <img id="userPhoto" class="user-photo" src="https://cdn.discordapp.com/attachments/1467065771107811428/1481643255975248064/image.png?ex=69b40f4f&is=69b2bdcf&hm=f0dc4a03b96184fc8531080dbb0d65e000fe9485a868dd870814dc2c0996786a&" alt="Вера Николаевна">
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="upgrades">📈 Улучшения</div>
    <div class="tab" data-tab="leaderboard">🏆 Топ-15</div>
  </div>

  <div id="tabContent" class="tab-content">
    <div id="upgradesTab"></div>
    <div id="leaderboardTab" class="hidden"></div>
  </div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  // ──────────────────────────────────────────────
  // СОСТОЯНИЕ ИГРОКА (локальное)
  // ──────────────────────────────────────────────
  let state = {
    coins: 0,
    energy: 500,
    maxEnergy: 500,
    tapsCount: 0,
    lastEnergyTime: Date.now(),
    tapValue: 1,
    energyPerTap: 2,
    passivePerSec: 0,
    upgrades: { pointer:0, notebook:0, desk:0, exam:0 }
  };

  let tgUser = { id: tg.initDataUnsafe?.user?.id || 999999, first_name: 'Ученик', last_name:'', username:'', photo_url:null };

  // Получаем данные из Telegram
  if (tg.initDataUnsafe?.user) {
    tgUser = tg.initDataUnsafe.user;
    document.getElementById('tgName').innerText = tgUser.first_name + (tgUser.last_name ? ' ' + tgUser.last_name : '');
    if (tgUser.photo_url) {
      const img = document.createElement('img');
      img.src = tgUser.photo_url;
      document.getElementById('avatarContainer').innerHTML = '';
      document.getElementById('avatarContainer').appendChild(img);
    } else {
      document.getElementById('avatarPlaceholder').innerText = tgUser.first_name?.[0] || '👤';
    }
  }

  // ──────────────────────────────────────────────
  // ГЛОБАЛЬНЫЙ ТОП (общий для всех на устройстве)
  // ──────────────────────────────────────────────
  let globalTop = [];

  function loadGlobalTop() {
    const saved = localStorage.getItem('school_clicker_global_top');
    if (saved) globalTop = JSON.parse(saved);
  }

  function saveGlobalTop() {
    localStorage.setItem('school_clicker_global_top', JSON.stringify(globalTop));
  }

  function updateGlobalTop() {
    if (state.tapsCount === 0) return;

    const player = {
      id: tgUser.id,
      name: tgUser.first_name + (tgUser.last_name ? ' ' + tgUser.last_name : tgUser.username ? ' (@'+tgUser.username+')' : ''),
      avatar: tgUser.photo_url || tgUser.first_name?.[0] || '👤',
      score: Math.floor(state.coins),
      taps: state.tapsCount,
      updated: Date.now()
    };

    // Удаляем старую запись этого игрока, если была
    globalTop = globalTop.filter(p => p.id !== player.id);

    // Добавляем новую
    globalTop.push(player);

    // Сортируем и оставляем только топ-20 (запас), потом отображаем 15
    globalTop.sort((a,b) => b.score - a.score);
    globalTop = globalTop.slice(0, 20);

    saveGlobalTop();
    renderLeaderboard();
  }

  function renderLeaderboard() {
    const container = document.getElementById('leaderboardTab');
    if (globalTop.length === 0) {
      container.innerHTML = '<div style="text-align:center; padding:40px; color:#765e31;">Пока никто не кликал. Стань первым!</div>';
      return;
    }

    let html = '';
    globalTop.slice(0,15).forEach((p, i) => {
      const rank = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i+1;
      html += `
        <div class="leaderboard-item">
          <div class="rank">${rank}</div>
          <div class="leader-avatar">${p.avatar.length === 1 ? p.avatar : '👤'}</div>
          <div class="leader-name">${p.name}</div>
          <div class="leader-score">${p.score.toLocaleString()}</div>
        </div>
      `;
    });
    container.innerHTML = html;
  }

  // ──────────────────────────────────────────────
  // ОСНОВНЫЕ ФУНКЦИИ
  // ──────────────────────────────────────────────
  function saveState() {
    localStorage.setItem('school_clicker_' + tgUser.id, JSON.stringify(state));
  }

  function loadState() {
    const key = 'school_clicker_' + tgUser.id;
    const saved = localStorage.getItem(key);
    if (saved) Object.assign(state, JSON.parse(saved));
    render();
    renderUpgrades();
    loadGlobalTop();
    renderLeaderboard();
  }

  function render() {
    document.getElementById('coins').innerText = Math.floor(state.coins).toLocaleString();
    document.getElementById('energyText').innerText = `${Math.floor(state.energy)}/${state.maxEnergy}`;
    document.getElementById('energyFill').style.width = (state.energy / state.maxEnergy * 100) + '%';
  }

  function createParticle(x, y) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = '+' + Math.floor(state.tapValue * (1 + state.upgrades.pointer * 0.3));
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }

  function handleClick(e) {
    e.preventDefault();
    if (state.energy < state.energyPerTap) {
      tg.HapticFeedback?.notificationOccurred('error');
      return;
    }

    state.energy -= state.energyPerTap;
    let earned = state.tapValue * (1 + state.upgrades.pointer * 0.3);
    state.coins += earned;
    state.tapsCount++;

    const touch = e.touches?.[0] || e;
    createParticle(touch.clientX, touch.clientY);

    tg.HapticFeedback?.impactOccurred('light');
    render();
    saveState();
    updateGlobalTop();          // ← здесь обновляем глобальный топ
  }

  function gameLoop() {
    const now = Date.now();
    const dt = Math.min(2, (now - state.lastEnergyTime)/1000);
    if (dt < 0.05) return;

    let passive = state.upgrades.notebook * 0.5 + state.upgrades.exam * 0.3;
    state.coins += passive * dt;

    const regen = state.maxEnergy * 0.01 * dt;
    state.energy = Math.min(state.maxEnergy, state.energy + regen);

    state.lastEnergyTime = now;
    render();
    saveState();
  }

  // ──────────────────────────────────────────────
  // УЛУЧШЕНИЯ
  // ──────────────────────────────────────────────
  const upgradesList = [
    { id:'pointer',   name:'Указка',          desc:'Увеличивает доход за тап',   income:'+30% за уровень', emoji:'🪄',   basePrice:50,  effect:()=>{} },
    { id:'notebook',  name:'Тетради',         desc:'Пассивный доход',            income:'+0.5/сек за уровень', emoji:'📚',   basePrice:80,  effect:()=>{} },
    { id:'desk',      name:'Учительский стол',desc:'Больше энергии',             income:'+20 макс энергии',     emoji:'🪑',   basePrice:120, effect:()=>{ state.maxEnergy += 20; } },
    { id:'exam',      name:'Контрольная',     desc:'Дополнительный пассив',       income:'+0.3/сек за уровень', emoji:'📝',   basePrice:200, effect:()=>{} }
  ];

  function renderUpgrades() {
    const container = document.getElementById('upgradesTab');
    let html = '';
    upgradesList.forEach(up => {
      const lvl = state.upgrades[up.id] || 0;
      const price = Math.floor(up.basePrice * (1 + lvl * 0.5));
      html += `
        <div class="upgrade-item">
          <div class="upgrade-emoji">${up.emoji}</div>
          <div class="upgrade-info">
            <div class="upgrade-name">${up.name} (ур. ${lvl})</div>
            <div class="upgrade-desc">${up.desc}</div>
            <div class="income-badge">📈 ${up.income}</div>
            <div class="upgrade-price">📚 ${price.toLocaleString()}</div>
          </div>
          <button class="buy-btn" data-id="${up.id}" data-price="${price}">Купить</button>
        </div>
      `;
    });
    container.innerHTML = html;

    document.querySelectorAll('.buy-btn').forEach(btn => {
      btn.onclick = e => {
        e.stopPropagation();
        const id = btn.dataset.id;
        const price = +btn.dataset.price;
        if (state.coins >= price) {
          state.coins -= price;
          state.upgrades[id] = (state.upgrades[id] || 0) + 1;
          const upgrade = upgradesList.find(u => u.id === id);
          if (upgrade.effect) upgrade.effect();
          saveState();
          render();
          renderUpgrades();
          updateGlobalTop();
        } else {
          tg.showAlert?.('Недостаточно тетрадей!') || alert('❌ Мало тетрадей!');
        }
      };
    });
  }

  // ──────────────────────────────────────────────
  // ВКЛАДКИ
  // ──────────────────────────────────────────────
  document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const target = tab.dataset.tab;
      document.getElementById('upgradesTab').classList.toggle('hidden', target !== 'upgrades');
      document.getElementById('leaderboardTab').classList.toggle('hidden', target !== 'leaderboard');
      if (target === 'upgrades') renderUpgrades();
      if (target === 'leaderboard') renderLeaderboard();
    };
  });

  // ──────────────────────────────────────────────
  // ЗАПУСК
  // ──────────────────────────────────────────────
  const clickArea = document.getElementById('clickArea');
  clickArea.addEventListener('touchstart', handleClick, {passive:false});
  clickArea.addEventListener('mousedown', handleClick);
  clickArea.addEventListener('contextmenu', e => e.preventDefault());

  loadState();
  setInterval(gameLoop, 400);   // чуть чаще, чтобы плавнее
  renderUpgrades();
</script>
</body>
</html>
