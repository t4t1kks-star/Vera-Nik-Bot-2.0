<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Вера Николаевна — Школьная Империя</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0; padding: 0; box-sizing: border-box;
      user-select: none; -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1a0f;
      color: #e8f5e9;
      height: 100vh; overflow: hidden;
    }
    #root {
      height: 100%;
      display: flex; flex-direction: column;
      background: linear-gradient(145deg, #1b2e1b, #0f1a0f);
    }
    .header {
      background: #2e5d2e;
      padding: 12px 16px;
      border-bottom: 3px solid #c9a547;
      display: flex; align-items: center; gap: 12px;
    }
    .tg-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: #4a704a; border: 3px solid #d4b874;
      overflow: hidden;
    }
    .tg-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-name { font-size: 1.3rem; font-weight: bold; color: #fff9e6; }
    .user-class { font-size: 0.9rem; color: #d4e8c8; }

    .score-panel {
      margin: 12px 16px; padding: 12px 20px;
      background: #234923; border-radius: 24px;
      border: 2px solid #b89f5c; box-shadow: 0 4px 0 #1a361a;
      display: flex; justify-content: space-between; align-items: center;
    }
    .score-value {
      font-size: 2.8rem; font-weight: 900; color: #ffeb3b;
      font-family: 'Courier New', monospace;
    }

    .energy-container { padding: 0 16px 8px; }
    .energy-bar-bg {
      height: 20px; background: #1e2e1e;
      border-radius: 30px; border: 2px solid #5c8a5c;
      overflow: hidden;
    }
    .energy-fill {
      height: 100%; background: linear-gradient(90deg, #ffca28, #fff176);
      transition: width 0.4s ease;
    }

    .click-area {
      flex: 1; display: flex; align-items: center; justify-content: center;
      position: relative; cursor: pointer;
    }
    .user-photo {
      width: 240px; height: 240px; border-radius: 50%;
      border: 8px solid #d4b874; box-shadow: 0 12px 30px rgba(0,0,0,0.7);
      object-fit: cover; transition: transform 0.12s;
    }
    .user-photo:active { transform: scale(0.94); }

    .particle {
      position: absolute; font-size: 2.2rem; font-weight: bold;
      color: #ffeb3b; text-shadow: 2px 2px 6px #000;
      pointer-events: none; animation: floatUp 1.2s forwards;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-160px) scale(0.7); }
    }

    .tabs {
      display: flex; background: #2e5d2e;
      border-top: 2px solid #c9a547; padding: 8px;
      gap: 6px; overflow-x: auto; scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex: 1; min-width: 80px; padding: 12px 0;
      background: #1f471f; color: #c8e6c9;
      border-radius: 16px 16px 0 0; text-align: center;
      font-weight: 600; border: 1px solid #8a6d3b;
      transition: all 0.2s;
    }
    .tab.active {
      background: #fffde7; color: #1b5e20; transform: translateY(-3px);
    }

    .tab-content {
      background: #f5f5f5; color: #1b5e20;
      flex: 1; overflow-y: auto; padding: 16px;
      border-top: 3px solid #b89f5c;
    }

    .card {
      background: white; border: 2px solid #c9a547;
      border-radius: 16px; padding: 16px; margin-bottom: 12px;
      box-shadow: 0 4px 0 #8a6d3b;
    }

    .upgrade-item { display: flex; align-items: center; gap: 16px; }
    .upgrade-emoji {
      font-size: 48px; width: 80px; height: 80px;
      background: #2e5d2e; border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      border: 3px solid #ffca28;
    }

    .buy-btn {
      background: #388e3c; color: white; font-weight: bold;
      padding: 12px 24px; border: none; border-radius: 999px;
      font-size: 1.05rem; cursor: pointer;
      box-shadow: 0 5px 0 #1b5e20; transition: all 0.15s;
      min-width: 110px;
    }
    .buy-btn:active {
      transform: translateY(3px); box-shadow: 0 2px 0 #1b5e20;
    }
    .buy-btn.disabled {
      background: #78909c; opacity: 0.6; cursor: not-allowed;
      box-shadow: none;
    }

    .hide-btn {
      background: none; border: none; color: #757575;
      font-size: 1.4rem; cursor: pointer; padding: 8px;
    }
  </style>
</head>
<body>
<div id="root">
  <div class="header">
    <div class="tg-avatar" id="avatarContainer"><span id="avatarPlaceholder">👤</span></div>
    <div>
      <div class="user-name" id="tgName">Загрузка...</div>
      <div class="user-class">9 класс • <span id="userRank">Новичок</span></div>
    </div>
  </div>

  <div class="score-panel">
    <span>📚 Всего тетрадей</span>
    <span class="score-value" id="coins">0</span>
  </div>

  <div class="energy-container">
    <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
      <span>🔋 Энергия</span>
      <span id="energyText">500/500</span>
    </div>
    <div class="energy-bar-bg"><div class="energy-fill" id="energyFill"></div></div>
  </div>

  <div class="click-area" id="clickArea">
    <img id="userPhoto" class="user-photo" src="https://cdn.discordapp.com/attachments/1467065771107811428/1481643255975248064/image.png" alt="Вера Николаевна">
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="upgrades">📈 Прокачка</div>
    <div class="tab" data-tab="daily">📅 Ежедневно</div>
    <div class="tab" data-tab="stats">📊 Статистика</div>
    <div class="tab" data-tab="leaderboard">🏆 Топ-15</div>
  </div>

  <div id="tabContent" class="tab-content">
    <div id="upgradesTab">
      <div style="display:flex;justify-content:space-between;margin-bottom:12px;">
        <span>Магазин улучшений</span>
        <button id="toggleHiddenBtn">Скрыть купленное</button>
      </div>
      <div id="upgradesList"></div>
    </div>

    <div id="dailyTab" style="display:none;">Ежедневные награды (временно упрощено)</div>
    <div id="statsTab" style="display:none;">Статистика (временно упрощено)</div>
    <div id="leaderboardTab" style="display:none;">
      <div id="leaderboardList"></div>
    </div>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();

let tgUser = { id: 0, first_name: 'Гость', photo_url: null };

try {
  if (tg.initDataUnsafe?.user) {
    tgUser = tg.initDataUnsafe.user;
    document.getElementById('tgName').textContent = tgUser.first_name || 'Ученик';
    if (tgUser.photo_url) {
      document.getElementById('avatarContainer').innerHTML = `<img src="${tgUser.photo_url}" alt="avatar">`;
    } else {
      document.getElementById('avatarPlaceholder').textContent = tgUser.first_name?.[0] || '👤';
    }
  }
} catch(e) {}

// Уникальный ключ сохранения именно для этого пользователя
const STORAGE_KEY = 'school_empire_' + tgUser.id;

// Глобальное состояние
let state = {
  coins: 0,
  totalCoins: 0,
  energy: 500,
  maxEnergy: 500,
  tapsCount: 0,
  totalTaps: 0,
  lastEnergyTime: Date.now(),
  tapValue: 1,
  energyPerTap: 2,
  passivePerSec: 0,
  upgrades: {
    pointer: 0, notebook: 0, desk: 0, exam: 0, chalk: 0,
    journal: 0, board: 0, coffee: 0, diploma: 0
  },
  hiddenUpgrades: [],
  lastSave: Date.now(),
  rank: 'Новичок'
};

// Глобальный топ (все игроки)
let leaderboard = [];

// ─── Загрузка ────────────────────────────────────────
function loadState() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try {
      const data = JSON.parse(saved);
      // Защита от битых данных
      if (data && typeof data === 'object') {
        Object.assign(state, data);
        // Исправляем возможные NaN / undefined
        state.coins = Number(state.coins) || 0;
        state.totalCoins = Number(state.totalCoins) || 0;
        state.energy = Number(state.energy) || 500;
        state.maxEnergy = Number(state.maxEnergy) || 500;
      }
    } catch(e) {
      console.warn("Повреждённое сохранение → сброс");
    }
  }
  applyUpgrades();
  renderAll();
}

function saveState() {
  state.lastSave = Date.now();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  saveToLeaderboard();
}

// ─── Лидерборд ───────────────────────────────────────
function loadLeaderboard() {
  const saved = localStorage.getItem('school_empire_global');
  if (saved) {
    try {
      leaderboard = JSON.parse(saved).filter(p => p && p.id && p.totalCoins > 0);
    } catch(e) {}
  }
}

function saveToLeaderboard() {
  if (state.totalCoins < 10) return; // не сохраняем почти пустых

  loadLeaderboard(); // актуализируем перед записью

  const player = {
    id: tgUser.id,
    name: tgUser.first_name || 'Аноним',
    avatar: tgUser.photo_url || tgUser.first_name?.[0] || '👤',
    totalCoins: Math.floor(state.totalCoins),
    taps: state.totalTaps || state.tapsCount,
    lastSeen: Date.now()
  };

  const index = leaderboard.findIndex(p => p.id === player.id);
  if (index >= 0) {
    if (player.totalCoins > leaderboard[index].totalCoins) {
      leaderboard[index] = player;
    }
  } else {
    leaderboard.push(player);
  }

  // Сортируем и оставляем топ-50 (для запаса)
  leaderboard.sort((a,b) => b.totalCoins - a.totalCoins);
  leaderboard = leaderboard.slice(0, 50);

  localStorage.setItem('school_empire_global', JSON.stringify(leaderboard));
  renderLeaderboard();
}

// ─── Улучшения ───────────────────────────────────────
const upgradesList = [
  {id:'pointer',   name:'Указка',     basePrice:50,   effect: lv => state.tapValue = 1 + lv*0.5},
  {id:'notebook',  name:'Тетради',    basePrice:80,   effect: lv => state.passivePerSec += lv*0.5},
  {id:'desk',      name:'Стол',       basePrice:120,  effect: lv => state.maxEnergy = 500 + lv*25},
  {id:'chalk',     name:'Мел',        basePrice:150,  effect: ()=>{}},
  {id:'exam',      name:'Контрольная',basePrice:200,  effect: lv => state.passivePerSec += lv*1},
  {id:'journal',   name:'Журнал',     basePrice:300,  effect: lv => state.passivePerSec += lv*0.8},
  {id:'board',     name:'Доска',      basePrice:400,  effect: lv => state.maxEnergy += lv*40},
  {id:'coffee',    name:'Кофе',       basePrice:500,  effect: ()=>{}},
  {id:'diploma',   name:'Диплом',     basePrice:5000, effect: ()=>{}},
];

function applyUpgrades() {
  state.passivePerSec = 0;
  state.tapValue = 1 + (state.upgrades.pointer || 0)*0.5 + (state.upgrades.chalk || 0)*0.3;
  state.passivePerSec += (state.upgrades.notebook || 0)*0.5;
  state.passivePerSec += (state.upgrades.exam || 0)*1;
  state.passivePerSec += (state.upgrades.journal || 0)*0.8;
  state.maxEnergy = 500 + (state.upgrades.desk || 0)*25 + (state.upgrades.board || 0)*40;

  if (state.upgrades.diploma > 0) {
    state.tapValue *= 2;
    state.passivePerSec *= 2;
  }

  if (state.energy > state.maxEnergy) state.energy = state.maxEnergy;
}

function getPrice(upId, level) {
  const base = upgradesList.find(u => u.id === upId)?.basePrice || 100;
  return Math.floor(base * Math.pow(1.55, level));
}

// ─── Рендер ──────────────────────────────────────────
function renderAll() {
  document.getElementById('coins').textContent = Math.floor(state.coins).toLocaleString();
  document.getElementById('energyText').textContent = `${Math.floor(state.energy)}/${state.maxEnergy}`;
  document.getElementById('energyFill').style.width = (state.energy / state.maxEnergy * 100) + '%';
  document.getElementById('userRank').textContent = state.rank || 'Новичок';
  renderUpgrades();
  renderLeaderboard();
}

function renderUpgrades() {
  const container = document.getElementById('upgradesList');
  const hideBought = document.getElementById('toggleHiddenBtn').textContent.includes('Скрыть');

  let html = '';
  upgradesList.forEach(up => {
    let level = state.upgrades[up.id] || 0;
    if (level >= 20) return; // лимит условный

    if (hideBought && level > 0) return;

    const price = getPrice(up.id, level);
    const canBuy = state.coins >= price;

    html += `
      <div class="card upgrade-item">
        <div class="upgrade-emoji">${up.emoji || '❔'}</div>
        <div style="flex:1;">
          <div style="font-weight:bold;font-size:1.2rem;">${up.name} (${level})</div>
          <div style="color:#555;font-size:0.9rem;">Цена: ${price.toLocaleString()}</div>
        </div>
        <button class="buy-btn ${canBuy?'':'disabled'}" 
                data-id="${up.id}" 
                data-price="${price}"
                ${canBuy?'':'disabled'}>
          Купить
        </button>
        <button class="hide-btn" data-id="${up.id}">🙈</button>
      </div>
    `;
  });
  container.innerHTML = html;

  // Делегирование событий (самый надёжный способ)
  container.addEventListener('click', e => {
    const btn = e.target.closest('.buy-btn');
    if (btn && !btn.disabled) {
      const id = btn.dataset.id;
      const price = Number(btn.dataset.price);
      if (state.coins >= price) {
        state.coins -= price;
        state.upgrades[id] = (state.upgrades[id] || 0) + 1;
        applyUpgrades();
        saveState();
        renderAll();
      }
      return;
    }

    const hideBtn = e.target.closest('.hide-btn');
    if (hideBtn) {
      const id = hideBtn.dataset.id;
      if (!state.hiddenUpgrades.includes(id)) {
        state.hiddenUpgrades.push(id);
        saveState();
        renderUpgrades();
      }
    }
  });
}

function renderLeaderboard() {
  const container = document.getElementById('leaderboardList');
  if (!container) return;

  if (leaderboard.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px;">Пока пусто. Сделай первые клики!</div>';
    return;
  }

  let html = '';
  leaderboard.slice(0,15).forEach((p, i) => {
    html += `
      <div class="card" style="display:flex;align-items:center;gap:12px;padding:12px;">
        <div style="font-size:1.6rem;font-weight:bold;width:40px;color:#ffb300;">${i+1}</div>
        <div style="flex:1;">
          <div>${p.name}</div>
          <div style="font-size:0.9rem;color:#666;">${p.taps || 0} кликов</div>
        </div>
        <div style="font-weight:bold;color:#ffca28;">${p.totalCoins.toLocaleString()}</div>
      </div>
    `;
  });
  container.innerHTML = html;
}

// ─── Клик ────────────────────────────────────────────
function handleClick(e) {
  e.preventDefault();
  if (state.energy < state.energyPerTap) return;

  state.energy -= state.energyPerTap;
  const earned = state.tapValue;
  state.coins += earned;
  state.totalCoins += earned;
  state.tapsCount++;
  state.totalTaps = (state.totalTaps || 0) + 1;

  // частица
  const rect = document.getElementById('clickArea').getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
  const p = document.createElement('div');
  p.className = 'particle';
  p.textContent = `+${Math.floor(earned)}`;
  p.style.left = x + 'px';
  p.style.top = y + 'px';
  document.getElementById('clickArea').appendChild(p);
  setTimeout(() => p.remove(), 1400);

  saveState();
  renderAll();
}

// ─── Игровой цикл ────────────────────────────────────
function gameLoop() {
  const now = Date.now();
  const dt = (now - state.lastEnergyTime) / 1000;
  state.lastEnergyTime = now;

  // пассив
  if (state.passivePerSec > 0) {
    const gain = state.passivePerSec * dt;
    state.coins += gain;
    state.totalCoins += gain;
  }

  // реген энергии
  const regen = state.maxEnergy * 0.01 * dt * (1 + (state.upgrades.coffee||0)*0.2);
  state.energy = Math.min(state.maxEnergy, state.energy + regen);

  saveState(); // сохраняем каждые ~сек
  renderAll();
}

// ─── Вкладки ─────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');

    const target = tab.dataset.tab + 'Tab';
    document.querySelectorAll('#tabContent > div').forEach(div => {
      div.style.display = div.id === target ? 'block' : 'none';
    });

    if (target === 'leaderboardTab') renderLeaderboard();
  });
});

document.getElementById('toggleHiddenBtn').addEventListener('click', e => {
  e.target.textContent = e.target.textContent.includes('Скрыть') ? 'Показать все' : 'Скрыть купленное';
  renderUpgrades();
});

// Запуск
document.getElementById('clickArea').addEventListener('touchstart', handleClick, {passive:false});
document.getElementById('clickArea').addEventListener('mousedown', handleClick);

loadState();
loadLeaderboard();
setInterval(gameLoop, 200);
gameLoop(); // первый тик сразу
</script>
</body>
</html>
