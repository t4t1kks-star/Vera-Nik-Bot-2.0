<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Вера Николаевна — Кликер</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1e0f;
      color: #e8f5e9;
      height: 100vh;
      overflow: hidden;
    }
    #root {
      height: 100%;
      display: flex;
      flex-direction: column;
      background: linear-gradient(to bottom, #1b3a1b, #0f1e0f);
    }

    /* Шапка */
    .header {
      background: #2e5d2e;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 3px solid #4a8c4a;
    }
    .tg-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #3a6a3a;
      border: 3px solid #81c784;
      overflow: hidden;
      flex-shrink: 0;
    }
    .tg-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .user-info .user-name {
      font-size: 1.35rem;
      font-weight: 700;
      color: #fffde7;
    }

    /* Основной счёт */
    .main-score {
      padding: 16px;
      text-align: center;
    }
    .score-label {
      font-size: 1rem;
      color: #a5d6a7;
      margin-bottom: 6px;
    }
    .score-value {
      font-size: 3.8rem;
      font-weight: 900;
      color: #fff176;
      text-shadow: 0 4px 12px rgba(0,0,0,0.6);
      line-height: 1;
    }

    /* Энергия */
    .energy-block {
      padding: 0 16px 12px;
    }
    .energy-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.95rem;
      color: #c8e6c9;
      margin-bottom: 6px;
    }
    .energy-bar {
      height: 24px;
      background: #1b3a1b;
      border-radius: 12px;
      border: 2px solid #4caf50;
      overflow: hidden;
    }
    .energy-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #81c784, #fff176);
      transition: width 0.4s ease;
    }

    /* Клик-зона */
    .click-zone {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 20px 0;
    }
    .teacher-photo {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      border: 8px solid #81c784;
      box-shadow: 0 12px 40px rgba(0,0,0,0.7);
      object-fit: cover;
      transition: transform 0.08s ease;
      user-select: none;
    }
    .teacher-photo:active {
      transform: scale(0.93);
    }

    /* Частицы */
    .particle {
      position: absolute;
      font-size: 32px;
      font-weight: 800;
      color: #fff176;
      text-shadow: 0 0 10px #000;
      pointer-events: none;
      animation: particleFloat 1.1s forwards;
    }
    @keyframes particleFloat {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-160px) scale(1.4); }
    }

    /* Нижняя панель промокодов */
    .promo-panel {
      background: #2e5d2e;
      padding: 16px;
      border-top: 3px solid #4a8c4a;
    }
    .promo-input {
      width: 100%;
      padding: 14px;
      font-size: 1.1rem;
      border: 2px solid #81c784;
      border-radius: 12px;
      background: #1b3a1b;
      color: white;
      margin-bottom: 12px;
    }
    .promo-btn {
      width: 100%;
      padding: 14px;
      font-size: 1.1rem;
      font-weight: bold;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
    .promo-btn:active {
      background: #388e3c;
    }
    .promo-message {
      margin-top: 12px;
      text-align: center;
      font-weight: bold;
      min-height: 1.4em;
    }
    .success { color: #fff176; }
    .error   { color: #ef9a9a; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="root">

  <div class="header">
    <div class="tg-avatar" id="avatarContainer">
      <span>👤</span>
    </div>
    <div class="user-info">
      <div class="user-name" id="tgName">Загрузка...</div>
    </div>
  </div>

  <div class="main-score">
    <div class="score-label">Проверено тетрадей</div>
    <div class="score-value" id="coins">0</div>
  </div>

  <div class="energy-block">
    <div class="energy-header">
      <span>Энергия</span>
      <span id="energyText">500 / 500</span>
    </div>
    <div class="energy-bar">
      <div class="energy-fill" id="energyFill"></div>
    </div>
  </div>

  <div class="click-zone" id="clickArea">
    <img id="userPhoto" class="teacher-photo"
         src="https://cdn.discordapp.com/attachments/1467065771107811428/1481643255975248064/image.png"
         alt="Вера Николаевна">
  </div>

  <div class="promo-panel">
    <input type="text" id="promoCode" class="promo-input" placeholder="Введи промокод" autocomplete="off">
    <button class="promo-btn" id="activatePromo">Активировать</button>
    <div id="promoMessage" class="promo-message"></div>
  </div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

// ──────────────────────────────────────────────
//  Фиксированный ключ — не зависит от user_id
// ──────────────────────────────────────────────
const STORAGE_KEY = "vera_nikolaevna_clicker_2026_fixed";

// Только эти промокоды работают (добавляй сюда новые)
const VALID_PROMOCODES = {
  "vera2026":       { coins: 15000, energy: 0,   msg: "Стартовый подарок от Веры Николаевны!" },
  "учителькрутая":  { coins: 5000,  energy: 300, msg: "Спасибо, что кликаешь ❤️" },
  "проверка2026":   { coins: 25000, energy: 500, msg: "Большая партия тетрадей!" },
  "secret777":      { coins: 77777, energy: 0,   msg: "Секретный бонус!" },
  // добавляй сюда новые промокоды по мере необходимости
};

let state = {
  coins: 0,
  energy: 500,
  maxEnergy: 500,
  lastEnergyTime: Date.now(),
  tapValue: 1,
  energyPerTap: 2,
  passivePerSec: 0,
  usedPromocodes: []          // какие промокоды уже активированы
};

function loadState() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try {
      Object.assign(state, JSON.parse(saved));
    } catch(e) {}
  }
  render();
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function render() {
  document.getElementById("coins").innerText = Math.floor(state.coins).toLocaleString();
  document.getElementById("energyText").innerText = `${Math.floor(state.energy)} / ${state.maxEnergy}`;
  document.getElementById("energyFill").style.width = (state.energy / state.maxEnergy * 100) + "%";
}

// ──── Частицы ───────────────────────────────────────
function createParticle(x, y) {
  const p = document.createElement("div");
  p.className = "particle";
  p.textContent = "+" + Math.floor(state.tapValue);
  p.style.left = x + "px";
  p.style.top  = y + "px";
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 1100);
}

// ──── Клик ──────────────────────────────────────────
function handleClick(e) {
  e.preventDefault();
  if (state.energy < state.energyPerTap) {
    tg.HapticFeedback?.notificationOccurred("error");
    return;
  }

  state.energy -= state.energyPerTap;
  state.coins += state.tapValue;

  const touch = e.touches?.[0] || e;
  createParticle(touch.clientX, touch.clientY);

  tg.HapticFeedback?.impactOccurred("light");
  render();
  saveState();
}

// ──── Восстановление энергии + пассив ───────────────
function gameLoop() {
  const now = Date.now();
  const dt = (now - state.lastEnergyTime) / 1000;
  state.lastEnergyTime = now;

  // пассив (пока 0, можно потом вернуть улучшения)
  state.coins += state.passivePerSec * dt;

  // реген энергии ~1% в секунду
  const regen = state.maxEnergy * 0.01 * dt;
  state.energy = Math.min(state.maxEnergy, state.energy + regen);

  render();
  saveState();
}

// ──── Промокоды ─────────────────────────────────────
document.getElementById("activatePromo").addEventListener("click", () => {
  const codeInput = document.getElementById("promoCode");
  const msgEl = document.getElementById("promoMessage");
  const code = codeInput.value.trim().toLowerCase();

  if (!code) {
    msgEl.textContent = "Введите промокод";
    msgEl.className = "promo-message error";
    return;
  }

  if (state.usedPromocodes.includes(code)) {
    msgEl.textContent = "Этот промокод уже использован";
    msgEl.className = "promo-message error";
    return;
  }

  const reward = VALID_PROMOCODES[code];
  if (!reward) {
    msgEl.textContent = "Промокод не найден 😔";
    msgEl.className = "promo-message error";
    return;
  }

  // выдаём награду
  state.coins += reward.coins || 0;
  state.energy = Math.min(state.maxEnergy, state.energy + (reward.energy || 0));
  state.usedPromocodes.push(code);

  msgEl.textContent = reward.msg || "Промокод активирован!";
  msgEl.className = "promo-message success";

  codeInput.value = "";
  render();
  saveState();

  tg.HapticFeedback?.notificationOccurred("success");
});

// ──── Инициализация ─────────────────────────────────
loadState();

const clickArea = document.getElementById("clickArea");
clickArea.addEventListener("touchstart", handleClick, { passive: false });
clickArea.addEventListener("mousedown", handleClick);
clickArea.addEventListener("contextmenu", e => e.preventDefault());

// Telegram-данные
try {
  if (tg.initDataUnsafe?.user) {
    const u = tg.initDataUnsafe.user;
    document.getElementById("tgName").innerText = u.first_name + (u.last_name ? " " + u.last_name : "");

    if (u.photo_url) {
      const img = document.createElement("img");
      img.src = u.photo_url;
      document.getElementById("avatarContainer").innerHTML = "";
      document.getElementById("avatarContainer").appendChild(img);
    } else {
      document.getElementById("avatarContainer").innerText = u.first_name?.[0] || "👤";
    }
  }
} catch(e) {}

// Запуск игрового цикла
setInterval(gameLoop, 400);
</script>
</body>
</html>
