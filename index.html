<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Вера Николаевна • Симулятор</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #0d0017;
      --card: #180d2b;
      --accent: #ff3366;
      --accent-dark: #d41e55;
      --text: #f5efff;
      --text-dim: #c4b5e0;
      --border: #3a2552;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(145deg, #0d0017, #1c0035);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      touch-action: manipulation;
      user-select: none;
    }
    #root {
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 14px 16px;
      background: rgba(10, 5, 25, 0.65);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .level {
      font-size: 1rem;
      color: var(--text-dim);
      margin-bottom: 4px;
    }
    .score {
      font-size: 3.2rem;
      font-weight: 800;
      color: var(--accent);
      text-shadow: 0 0 24px rgba(255,51,102,0.6);
      line-height: 1;
    }
    .energy-bar {
      height: 10px;
      background: #1a0f2e;
      border-radius: 5px;
      margin: 12px 8px 8px;
      overflow: hidden;
      border: 1px solid #2e1f45;
    }
    .energy-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, var(--accent), #ff6699);
      transition: width 0.5s ease-out;
    }
    #vera-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      font-size: 220px;
      cursor: pointer;
      transition: transform 0.1s ease;
    }
    #vera-area:active {
      transform: scale(0.94);
    }
    .particle {
      position: absolute;
      font-size: 32px;
      font-weight: 800;
      color: var(--accent);
      pointer-events: none;
      text-shadow: 0 0 14px currentColor;
      animation: floatUp 1.3s forwards;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) scale(0.7); opacity: 0.95; }
      40%  { transform: translateY(-60px) scale(1.15); }
      100% { transform: translateY(-180px) scale(0.4); opacity: 0; }
    }
    .bottom-bar {
      padding: 12px 16px;
      background: rgba(15,8,35,0.75);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.92rem;
    }
    .stat {
      text-align: center;
      flex: 1;
    }
    .stat b {
      color: var(--accent);
      font-size: 1.3rem;
      display: block;
    }
    .promo-btn {
      background: linear-gradient(145deg, #2a1545, #3a1f5c);
      color: #e0d0ff;
      border: 1px solid #664a99;
      border-radius: 12px;
      padding: 10px 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .promo-btn:active {
      transform: scale(0.96);
      background: linear-gradient(145deg, #3a1f5c, #2a1545);
    }

    @media (min-height: 780px)  { #vera-area { font-size: 260px; } }
    @media (min-height: 920px)  { #vera-area { font-size: 300px; } }
    @media (min-height: 1100px) { #vera-area { font-size: 340px; } }
  </style>
</head>
<body>
<div id="root">
  <header>
    <div class="level">Уровень <span id="lvl">1</span> • Вера Николаевна</div>
    <div class="score" id="coins">0</div>
    <div class="energy-bar">
      <div class="energy-fill" id="energyFill" style="width:100%"></div>
    </div>
  </header>

  <div id="vera-area">🧮</div>

  <div class="bottom-bar">
    <div class="stat">
      Энергия<br>
      <b id="energyText">1000/1000</b>
    </div>
    <div class="stat">
      в сек<br>
      <b id="passive">0.0</b>
    </div>
    <button class="promo-btn" id="promoButton">Промокод</button>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

let state = {
  coins: 0,
  level: 1,
  energy: 1000,
  maxEnergy: 1000,
  passivePerSec: 0,
  lastEnergyTime: Date.now(),
  tapValue: 1,
  energyPerTap: 1,
  upgradesBought: {}
};

// Промокоды (только те, что ты раздаёшь лично)
const PROMOCODES = {
  "верочка2026":      { coins: 5000,     energy: 0,    message: "Стартовый подарок от Веры!" },
  "математикаforever": { coins: 15000,    energy: 300,  message: "За любовь к цифрам ✨" },
  "кофе4вере":        { coins: 0,         energy: 800,  message: "Кофе в учительскую! ☕" },
  "внсупер":          { coins: 25000,     energy: 0,    message: "Супер-активация!" },
  // добавляй сюда новые коды по мере необходимости
};

function saveState() {
  localStorage.setItem("vera_state", JSON.stringify(state));
}

function loadState() {
  const saved = localStorage.getItem("vera_state");
  if (saved) Object.assign(state, JSON.parse(saved));
  render();
}

function render() {
  document.getElementById("coins").textContent = Math.floor(state.coins).toLocaleString();
  document.getElementById("lvl").textContent = state.level;
  document.getElementById("energyText").textContent = `${Math.floor(state.energy)}/${state.maxEnergy}`;
  document.getElementById("passive").textContent = state.passivePerSec.toFixed(1);

  const pct = Math.min(100, (state.energy / state.maxEnergy) * 100);
  document.getElementById("energyFill").style.width = pct + "%";
}

let lastTapTime = 0;

function createParticle(x, y) {
  const p = document.createElement("div");
  p.className = "particle";
  p.textContent = "+" + state.tapValue;
  p.style.left = x + "px";
  p.style.top  = y + "px";
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 1500);
}

function onTap(e) {
  const now = Date.now();
  if (now - lastTapTime < 35) return;
  lastTapTime = now;

  if (state.energy < state.energyPerTap) return;

  state.energy -= state.energyPerTap;
  state.coins += state.tapValue;

  const x = e.touches ? e.touches[0].clientX : e.clientX;
  const y = e.touches ? e.touches[0].clientY : e.clientY;
  createParticle(x, y);

  render();
  saveState();
}

function gameLoop() {
  const now = Date.now();
  const dt = (now - state.lastEnergyTime) / 1000;
  state.lastEnergyTime = now;

  state.coins += state.passivePerSec * dt;
  const regen = 1; // 1 ед. энергии в секунду
  state.energy = Math.min(state.maxEnergy, state.energy + regen * dt);

  render();
}

// ─── Промокоды ───────────────────────────────────────
document.getElementById("promoButton").addEventListener("click", () => {
  const code = prompt("Введи промокод (только от владельца)").trim().toLowerCase();
  if (!code) return;

  const reward = PROMOCODES[code];
  if (reward) {
    state.coins += reward.coins || 0;
    state.energy = Math.min(state.maxEnergy, state.energy + (reward.energy || 0));

    alert(`Промокод активирован!\n${reward.message}\n+${reward.coins || 0} монет\n+${reward.energy || 0} энергии`);

    render();
    saveState();
  } else {
    alert("Неверный или просроченный промокод 😔");
  }
});

// ─── Инициализация ───────────────────────────────────
document.getElementById("vera-area").addEventListener("pointerdown", onTap);
document.getElementById("vera-area").addEventListener("touchstart", onTap, { passive: true });

loadState();
setInterval(gameLoop, 700);

// Кнопка магазина (пока заглушка)
tg.MainButton.setText("Магазин улучшений");
tg.MainButton.show();
tg.MainButton.onClick(() => {
  alert("Магазин скоро откроется!\n\nПланируется:\n• Доска и мел → +1–4 за тап\n• Термос с кофе → энергия\n• Классный журнал → пассив\n• Контрольные ×2 / ×3");
});
</script>
</body>
</html>
