<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Вера Николаевна · Империя</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0f0a;
      --card: rgba(20, 30, 20, 0.78);
      --glass: rgba(30, 45, 30, 0.45);
      --accent: #ffd700;
      --accent-dark: #d4af37;
      --neon: #00ff9d;
      --text: #f0fff0;
      --text-dim: #b0e0b0;
      --green: #00c853;
      --green-dark: #009624;
    }

    * {
      margin: 0; padding: 0; box-sizing: border-box;
      user-select: none; -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Manrope', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    #root {
      height: 100%;
      display: flex;
      flex-direction: column;
      background: radial-gradient(circle at 20% 30%, #1a2f1a 0%, var(--bg) 70%);
    }

    .header {
      background: rgba(15, 25, 15, 0.92);
      backdrop-filter: blur(12px);
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,215,0,0.18);
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 20;
    }

    .tg-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00c853, #009624);
      border: 3px solid var(--accent);
      box-shadow: 0 0 16px rgba(0,200,83,0.4);
      overflow: hidden;
    }

    .tg-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .user-name {
      font-size: 1.32rem;
      font-weight: 700;
      color: var(--accent);
      text-shadow: 0 1px 6px rgba(255,215,0,0.5);
    }

    .score-panel {
      margin: 16px 16px 10px;
      padding: 16px 20px;
      background: var(--glass);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      border: 1px solid rgba(255,215,0,0.25);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .score-value {
      font-family: 'Orbitron', monospace;
      font-size: 3.1rem;
      font-weight: 700;
      color: var(--accent);
      text-shadow: 0 4px 16px rgba(255,215,0,0.6);
      letter-spacing: -1px;
    }

    .energy-bar-bg {
      height: 24px;
      background: rgba(10,20,10,0.8);
      border-radius: 999px;
      border: 1px solid rgba(0,200,83,0.3);
      overflow: hidden;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.6);
    }

    .energy-fill {
      height: 100%;
      background: linear-gradient(90deg, #00ff9d, #00c853);
      transition: width 0.5s ease-out;
      box-shadow: 0 0 20px rgba(0,255,157,0.7);
    }

    .click-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 20px 0;
    }

    .user-photo {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      border: 10px solid rgba(255,215,0,0.4);
      box-shadow: 
        0 25px 50px -12px rgba(0,0,0,0.8),
        0 0 0 8px rgba(0,200,83,0.35),
        inset 0 6px 20px rgba(0,0,0,0.4);
      object-fit: cover;
      transition: all 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .user-photo:active {
      transform: scale(0.92) rotate(3deg);
      border-color: var(--neon);
      box-shadow: 0 15px 40px -10px rgba(0,255,157,0.6);
    }

    .particle {
      position: absolute;
      font-family: 'Orbitron', monospace;
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--accent);
      text-shadow: 0 0 12px rgba(255,215,0,0.9);
      pointer-events: none;
      z-index: 30;
      animation: particleFloat 1.3s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }

    @keyframes particleFloat {
      0%   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
      60%  { opacity: 1; transform: translateY(-100px) scale(1.3) rotate(10deg); }
      100% { opacity: 0; transform: translateY(-220px) scale(0.6) rotate(25deg); }
    }

    .tabs-container {
      position: relative;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 10;
    }

    .tabs-container.hidden {
      transform: translateY(100%);
    }

    .tabs {
      display: flex;
      background: rgba(15, 25, 15, 0.9);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,215,0,0.22);
      padding: 10px 12px 14px;
      gap: 8px;
    }

    .tab {
      flex: 1;
      padding: 14px 0 10px;
      text-align: center;
      background: rgba(25,40,25,0.6);
      color: var(--text-dim);
      font-weight: 600;
      font-size: 0.98rem;
      border-radius: 16px 16px 0 0;
      border: 1px solid rgba(0,255,157,0.18);
      transition: all 0.3s ease;
    }

    .tab.active {
      background: rgba(0,200,83,0.22);
      color: var(--neon);
      font-weight: 700;
      transform: translateY(-6px);
      box-shadow: 0 -8px 20px rgba(0,200,83,0.35);
    }

    .tab-content {
      background: var(--glass);
      backdrop-filter: blur(8px);
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      border-top: 1px solid rgba(255,215,0,0.15);
    }

    .card {
      background: rgba(25,40,25,0.65);
      border: 1px solid rgba(255,215,0,0.2);
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
      backdrop-filter: blur(6px);
      transition: transform 0.22s ease;
    }

    .card:active { transform: scale(0.98); }

    .upgrade-emoji {
      font-size: 52px;
      width: 88px;
      height: 88px;
      background: linear-gradient(145deg, #1e3a1e, #0f2210);
      border-radius: 24px;
      border: 3px solid rgba(0,255,157,0.4);
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .buy-btn {
      background: linear-gradient(145deg, var(--green), var(--green-dark));
      border: none;
      color: white;
      font-weight: 700;
      padding: 14px 32px;
      border-radius: 999px;
      font-size: 1.08rem;
      box-shadow: 0 8px 0 var(--green-dark);
      transition: all 0.18s ease;
      min-width: 130px;
    }

    .buy-btn:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 var(--green-dark);
    }

    .buy-btn:disabled {
      opacity: 0.4;
      transform: none;
      box-shadow: none;
      pointer-events: none;
    }

    .promo-input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(15,25,15,0.8);
      border: 1px solid rgba(255,215,0,0.3);
      border-radius: 16px;
      color: var(--text);
      font-size: 1.1rem;
      margin: 12px 0;
    }

    .toggle-tabs-btn {
      position: fixed;
      bottom: 16px;
      right: 16px;
      width: 64px;
      height: 64px;
      background: linear-gradient(145deg, #00c853, #009624);
      border-radius: 50%;
      color: white;
      font-size: 1.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(0,200,83,0.5);
      z-index: 100;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .toggle-tabs-btn.hidden-tabs {
      transform: rotate(180deg);
    }
  </style>
</head>
<body>
<div id="root">

  <!-- Header -->
  <div class="header">
    <div class="tg-avatar" id="avatarContainer"><span>👤</span></div>
    <div>
      <div class="user-name" id="tgName">Загрузка...</div>
      <div style="font-size:0.88rem;opacity:0.9;">Империя Веры Николаевны</div>
    </div>
  </div>

  <!-- Score & Energy -->
  <div class="score-panel">
    <span style="font-size:1.05rem;opacity:0.9;">Тетради</span>
    <span id="coins" class="score-value">0</span>
  </div>

  <div style="padding:0 16px 12px;">
    <div style="display:flex;justify-content:space-between;font-size:0.95rem;margin-bottom:6px;opacity:0.9;">
      <span>Энергия</span>
      <span id="energyText">500 / 500</span>
    </div>
    <div class="energy-bar-bg">
      <div class="energy-fill" id="energyFill" style="width:100%"></div>
    </div>
  </div>

  <!-- Main Click Area -->
  <div class="click-area" id="clickArea">
    <img id="userPhoto" class="user-photo" 
         src="https://cdn.discordapp.com/attachments/1467065771107811428/1481643255975248064/image.png"
         alt="Вера Николаевна">
  </div>

  <!-- Tabs (скрываемая панель) -->
  <div class="tabs-container" id="tabsContainer">
    <div class="tabs">
      <div class="tab active" data-tab="upgrades">Улучшения</div>
      <div class="tab" data-tab="promo">Промокоды</div>
      <div class="tab" data-tab="stats">Статистика</div>
      <div class="tab" data-tab="top">Топ</div>
    </div>

    <div id="tabContent" class="tab-content">

      <!-- Улучшения -->
      <div id="upgradesTab">
        <div id="upgradesList"></div>
      </div>

      <!-- Промокоды -->
      <div id="promoTab" style="display:none;">
        <div class="card">
          <h3 style="margin-bottom:16px;color:var(--accent);">Активация промокода</h3>
          <input type="text" id="promoCodeInput" class="promo-input" placeholder="Введи код от t4t1kk">
          <button id="activatePromoBtn" class="buy-btn" style="width:100%;margin-top:12px;">Активировать</button>
          <div id="promoMessage" style="margin-top:16px;min-height:24px;"></div>
        </div>
      </div>

      <!-- Статистика и Топ — заглушки, можно расширить -->
      <div id="statsTab" style="display:none;" class="card">Статистика (в разработке)</div>
      <div id="topTab" style="display:none;" class="card">Топ игроков (в разработке)</div>
    </div>
  </div>

  <!-- Кнопка показа/скрытия панели вкладок -->
  <div class="toggle-tabs-btn" id="toggleTabsBtn">↓</div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();

let user = tg.initDataUnsafe?.user || {};
document.getElementById('tgName').textContent = user.first_name || 'Ученик';

// ─── Состояние ───────────────────────────────────────
let state = {
  coins: 0,
  energy: 500,
  maxEnergy: 500,
  tapValue: 1,
  passivePerSec: 0,
  energyPerTap: 2,
  totalTaps: 0,
  lastEnergyTime: Date.now(),
  upgrades: {},
  usedPromos: []
};

const STORAGE_KEY = 'vera_empire_' + (user.id || 'guest');

function loadState() {
  const data = localStorage.getItem(STORAGE_KEY);
  if (data) Object.assign(state, JSON.parse(data));
  applyUpgrades();
  render();
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// ─── Улучшения ───────────────────────────────────────
const upgradesData = [
  { id: 'pointer',  name: 'Указка',      emoji: '🪄', basePrice: 60,   incTap: 0.6  },
  { id: 'notebook', name: 'Тетрадь',     emoji: '📓', basePrice: 90,   incPassive: 0.6 },
  { id: 'desk',     name: 'Стол',        emoji: '🪑', basePrice: 140,  incMaxEnergy: 30 },
  { id: 'chalk',    name: 'Мел',         emoji: '✏️', basePrice: 180,  incTap: 0.4  },
  { id: 'coffee',   name: 'Кофе',        emoji: '☕', basePrice: 450,  incRegen: 0.25 },
  { id: 'board',    name: 'Доска',       emoji: '📋', basePrice: 800,  incMaxEnergy: 60 },
  { id: 'diploma',  name: 'Диплом',      emoji: '🎓', basePrice: 12000, multiplier: 2, max: 1 }
];

function getLevel(id) { return state.upgrades[id] || 0; }

function getPrice(item) {
  const lvl = getLevel(item.id);
  return Math.floor(item.basePrice * Math.pow(1.58, lvl));
}

function applyUpgrades() {
  let tap = 1;
  let passive = 0;
  let maxE = 500;
  let regenBonus = 1;

  upgradesData.forEach(item => {
    const lvl = getLevel(item.id);
    if (lvl === 0) return;

    if (item.incTap)      tap += item.incTap * lvl;
    if (item.incPassive)  passive += item.incPassive * lvl;
    if (item.incMaxEnergy) maxE += item.incMaxEnergy * lvl;
    if (item.incRegen)    regenBonus += item.incRegen * lvl;
    if (item.multiplier && lvl >= 1) {
      tap *= item.multiplier;
      passive *= item.multiplier;
    }
  });

  state.tapValue = tap;
  state.passivePerSec = passive;
  state.maxEnergy = maxE;
  // regenBonus можно использовать в gameLoop
}

function renderUpgrades() {
  const container = document.getElementById('upgradesList');
  let html = '';

  upgradesData.forEach(item => {
    const lvl = getLevel(item.id);
    if (item.max && lvl >= item.max) return;

    const price = getPrice(item);
    const canBuy = state.coins >= price;

    html += `
      <div class="card" style="display:flex;gap:16px;align-items:center;">
        <div class="upgrade-emoji">${item.emoji}</div>
        <div style="flex:1;">
          <div style="font-size:1.28rem;font-weight:700;">${item.name} ${lvl ? `(${lvl})` : ''}</div>
          <div style="font-size:0.92rem;opacity:0.85;margin-top:4px;">
            ${price.toLocaleString()} тетрадей
          </div>
        </div>
        <button class="buy-btn ${canBuy ? '' : 'disabled'}" 
                data-upgrade="${item.id}"
                ${canBuy ? '' : 'disabled'}>
          Купить
        </button>
      </div>
    `;
  });

  container.innerHTML = html;
}

// ─── Промокоды (пример — только владелец t4t1kk может давать такие) ───────
const promoCodes = {
  // t4t1kk может добавлять сюда коды вручную или через админку позже
  "t4t1kk2026":     { coins: 15000, energy: 1000, message: "Секретный подарок от t4t1kk!" },
  "vera-best":      { coins: 5000,  message: "Вера одобряет :)" },
  "school-2026":    { coins: 8000,  energy: 500 }
};

document.getElementById('activatePromoBtn').addEventListener('click', () => {
  const code = document.getElementById('promoCodeInput').value.trim().toLowerCase();
  const msgEl = document.getElementById('promoMessage');

  if (!code) {
    msgEl.textContent = "Введи код...";
    msgEl.style.color = "#ff9800";
    return;
  }

  if (state.usedPromos.includes(code)) {
    msgEl.textContent = "Этот код уже использован";
    msgEl.style.color = "#f44336";
    return;
  }

  const reward = promoCodes[code];
  if (!reward) {
    msgEl.textContent = "Неверный или просроченный код";
    msgEl.style.color = "#f44336";
    return;
  }

  // Активация
  if (reward.coins)  state.coins += reward.coins;
  if (reward.energy) state.energy = Math.min(state.maxEnergy, state.energy + reward.energy);

  state.usedPromos.push(code);
  saveState();
  render();

  msgEl.textContent = reward.message || `+${reward.coins || 0} тетрадей!`;
  msgEl.style.color = "var(--neon)";
});

// ─── Клик ────────────────────────────────────────────
function createParticle(x, y, value) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.textContent = `+${Math.floor(value)}`;
  p.style.left = x + 'px';
  p.style.top  = y + 'px';
  document.getElementById('clickArea').appendChild(p);
  setTimeout(() => p.remove(), 1600);
}

document.getElementById('clickArea').addEventListener('touchstart', e => {
  e.preventDefault();
  if (state.energy < state.energyPerTap) return;

  state.energy -= state.energyPerTap;
  const earned = state.tapValue;
  state.coins += earned;
  state.totalTaps++;

  const touch = e.touches[0];
  const rect = e.currentTarget.getBoundingClientRect();
  createParticle(touch.clientX - rect.left, touch.clientY - rect.top, earned);

  saveState();
  render();
}, { passive: false });

// ─── Игровой цикл ────────────────────────────────────
function gameLoop() {
  const now = Date.now();
  const dt = (now - state.lastEnergyTime) / 1000;
  state.lastEnergyTime = now;

  // Пассивный доход
  state.coins += state.passivePerSec * dt;

  // Реген энергии (1% в секунду + бонусы от кофе)
  const regenRate = 0.01 * (1 + (getLevel('coffee') * 0.25));
  state.energy = Math.min(state.maxEnergy, state.energy + state.maxEnergy * regenRate * dt);

  render();
  // save каждые ~2 сек
  if (now % 2000 < 300) saveState();
}

setInterval(gameLoop, 150);

// ─── Вкладки + скрытие панели ────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');

    const tabId = tab.dataset.tab + 'Tab';
    document.querySelectorAll('#tabContent > div').forEach(div => {
      div.style.display = div.id === tabId ? 'block' : 'none';
    });

    if (tabId === 'upgradesTab') renderUpgrades();
  });
});

const tabsContainer = document.getElementById('tabsContainer');
const toggleBtn = document.getElementById('toggleTabsBtn');

toggleBtn.addEventListener('click', () => {
  tabsContainer.classList.toggle('hidden');
  toggleBtn.classList.toggle('hidden-tabs');
  toggleBtn.textContent = tabsContainer.classList.contains('hidden') ? '↑' : '↓';
});

// ─── Инит ────────────────────────────────────────────
loadState();
renderUpgrades();
gameLoop(); // первый тик
</script>
</body>
</html>
